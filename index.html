    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #b5b5b5; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; gap: 16px; min-height: 100vh; }

        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; color: #bbb; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; background: #333; border: 1px solid #444; border-radius: 6px; color: white; font-size: 0.95rem; }
        .result-box { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-top: auto; text-align: center; border: 1px solid #333; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 5px; padding: 5px 0; border-bottom: 1px solid #333; }
        .res-val { font-size: 1.1rem; font-weight: bold; color: #4caf50; }
        @media (max-width: 1200px) { .side-image { width: 130px; } }
        @media (max-width: 1000px) { .side-image { display: none; } }
        @media (max-width: 750px) { .grid-container { grid-template-columns: 1fr; } }
